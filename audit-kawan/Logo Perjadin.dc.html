<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#fbf1f3;}
    @keyframes pjWord{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pjCard{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pjPlane{0%{left:8%;opacity:0}15%{opacity:1}100%{left:84%;opacity:1}}
    @keyframes pjStamp{0%{opacity:0;transform:rotate(-12deg) scale(1.7)}60%{opacity:1;transform:rotate(-12deg) scale(.94)}100%{opacity:1;transform:rotate(-12deg) scale(1)}}
  </style>
</helmet>
<div data-screen-label="Logo Perjadin" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse 70% 60% at 50% 42%,#fdf4f6,#f6e3e8); overflow:hidden; cursor:pointer; font-family:'Space Grotesk', system-ui, sans-serif;">
  <div style="position:relative; display:flex; flex-direction:column; align-items:center; gap:clamp(18px,2.4vw,28px);">
    <div data-anim style="font-weight:700; font-size:clamp(50px,9.4vw,124px); line-height:1; letter-spacing:-.02em; color:#9f1239; animation:pjWord .7s cubic-bezier(0.16,1,0.3,1) .1s both;">Perjadin</div>
    <div data-anim style="position:relative; width:clamp(280px,38vw,432px); padding:clamp(16px,2vw,22px) clamp(18px,2.2vw,26px); background:#fff; border-radius:14px; box-shadow:0 16px 38px rgba(159,18,57,.15); animation:pjCard .6s cubic-bezier(0.16,1,0.3,1) .35s both;">
      <div style="display:flex; align-items:center; justify-content:space-between; font-family:'Space Mono',monospace;">
        <div style="text-align:center;"><div style="font-weight:700; font-size:clamp(20px,2.6vw,30px); color:#9f1239; line-height:1;">BTH</div><div style="font-size:clamp(8px,1vw,11px); color:#c99; letter-spacing:.1em;">BATAM</div></div>
        <div style="position:relative; flex:1; height:28px; margin:0 14px;">
          <div style="position:absolute; top:50%; left:0; right:0; border-top:2px dashed #e4b8c2;"></div>
          <div data-anim style="position:absolute; top:50%; transform:translateY(-50%); color:#e11d48; font-size:20px; left:8%; animation:pjPlane 1.6s cubic-bezier(0.4,0,0.3,1) .6s both;">✈</div>
        </div>
        <div style="text-align:center;"><div style="font-weight:700; font-size:clamp(20px,2.6vw,30px); color:#9f1239; line-height:1;">CGK</div><div style="font-size:clamp(8px,1vw,11px); color:#c99; letter-spacing:.1em;">JAKARTA</div></div>
      </div>
      <div data-anim aria-hidden="true" style="position:absolute; top:-12px; right:-8px; display:flex; flex-direction:column; align-items:center; padding:6px 12px; border:2.5px solid #16a34a; border-radius:7px; color:#16a34a; transform:rotate(-12deg); background:rgba(255,255,255,.6); animation:pjStamp .55s cubic-bezier(0.3,1.3,0.5,1) 1.7s both;"><span style="font-family:'Space Mono',monospace; font-weight:700; font-size:clamp(13px,1.7vw,19px); letter-spacing:.06em; line-height:1;">✓ SESUAI</span><span style="font-family:'Space Mono',monospace; font-size:clamp(6px,.8vw,9px); letter-spacing:.18em;">AUDIT PERJADIN</span></div>
    </div>
  </div>
  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:1px solid rgba(159,18,57,.2); background:transparent; color:#9f1239; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:.6;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play(){const r=this.root;if(!r)return;r.querySelectorAll('[data-anim]').forEach(el=>{const s=el.style.animation;el.style.animation='none';void el.offsetWidth;el.style.animation=s;});}
  renderVals(){return {rootRef:el=>{this.root=el;},rootClick:()=>this.play(),replayClick:e=>{if(e)e.stopPropagation();this.play();}};}
}
</script>
</body>
</html>

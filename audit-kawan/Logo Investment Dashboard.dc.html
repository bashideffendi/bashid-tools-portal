<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#ecf6ef;}
    @keyframes ivWord{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes ivLine{from{stroke-dashoffset:240}to{stroke-dashoffset:0}}
    @keyframes ivArea{from{opacity:0}to{opacity:1}}
    @keyframes ivVal{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes ivDot{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
  </style>
</helmet>
<div data-screen-label="Logo Investment Dashboard" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse 70% 60% at 50% 42%,#f1f9f3,#dff0e5); overflow:hidden; cursor:pointer; font-family:'Plus Jakarta Sans', system-ui, sans-serif;">
  <div style="position:relative; display:flex; flex-direction:column; align-items:center; gap:clamp(16px,2.2vw,26px);">
    <div style="text-align:center;">
      <div data-anim style="font-weight:800; font-size:clamp(44px,8vw,104px); line-height:1; letter-spacing:-.03em; color:#14532d; animation:ivWord .7s cubic-bezier(0.16,1,0.3,1) .1s both;">Investment</div>
      <div data-anim style="font-family:'Space Mono',monospace; font-size:clamp(10px,1.3vw,14px); letter-spacing:.32em; text-transform:uppercase; color:#16a34a; margin-top:8px; animation:ivWord .6s ease .28s both;">Dashboard</div>
    </div>
    <div style="position:relative; width:clamp(290px,40vw,440px); padding:clamp(18px,2.2vw,24px); background:#fff; border-radius:16px; box-shadow:0 18px 42px rgba(20,83,45,.14);">
      <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px;">
        <div data-anim style="font-weight:800; font-size:clamp(22px,3vw,34px); color:#14532d; letter-spacing:-.02em; animation:ivVal .6s cubic-bezier(0.16,1,0.3,1) 1.2s both;">Rp 4,82 M</div>
        <div data-anim style="font-family:'Space Mono',monospace; font-weight:700; font-size:clamp(12px,1.5vw,16px); color:#16a34a; animation:ivVal .6s cubic-bezier(0.16,1,0.3,1) 1.35s both;">▲ +24,8%</div>
      </div>
      <svg viewBox="0 0 240 96" preserveAspectRatio="none" style="display:block; width:100%; height:clamp(70px,9vw,104px); overflow:visible;">
        <defs><linearGradient id="ivg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16a34a" stop-opacity=".28"/><stop offset="1" stop-color="#16a34a" stop-opacity="0"/></linearGradient></defs>
        <path data-anim d="M4 80 L44 66 L84 72 L124 44 L164 52 L204 22 L236 10 L236 96 L4 96 Z" fill="url(#ivg)" style="opacity:0; animation:ivArea .6s ease 1.1s both;"></path>
        <path data-anim d="M4 80 L44 66 L84 72 L124 44 L164 52 L204 22 L236 10" fill="none" stroke="#16a34a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" pathLength="240" style="stroke-dasharray:240; stroke-dashoffset:240; animation:ivLine 1.3s cubic-bezier(0.5,0,0.2,1) .5s both;"></path>
        <circle data-anim cx="236" cy="10" r="5.5" fill="#16a34a" style="transform-origin:236px 10px; opacity:0; animation:ivDot .4s cubic-bezier(0.34,1.6,0.6,1) 1.7s both;"></circle>
      </svg>
    </div>
  </div>
  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:1px solid rgba(20,83,45,.2); background:transparent; color:#14532d; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:.6;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play(){const r=this.root;if(!r)return;r.querySelectorAll('[data-anim]').forEach(el=>{const s=el.style.animation;el.style.animation='none';void el.offsetWidth;el.style.animation=s;});}
  renderVals(){return {rootRef:el=>{this.root=el;},rootClick:()=>this.play(),replayClick:e=>{if(e)e.stopPropagation();this.play();}};}
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#fbf3e4;}
    @keyframes jcRing{from{stroke-dashoffset:264}to{stroke-dashoffset:62}}
    @keyframes jcPop{0%{opacity:0;transform:scale(.6)}68%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
    @keyframes jcWord{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes jcTag{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</helmet>
<div data-screen-label="Logo Just Count" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; gap:clamp(24px,4.5vw,72px); flex-wrap:wrap; background:radial-gradient(ellipse 74% 66% at 50% 42%,#fdf8ee,#f3e6cc); overflow:hidden; cursor:pointer; font-family:'Space Grotesk', system-ui, sans-serif;">
  <div data-anim style="position:relative; flex:none; animation:jcPop .6s cubic-bezier(0.34,1.4,0.6,1) .15s both;">
    <svg width="clamp(150px,20vw,236px)" viewBox="0 0 100 100" style="display:block;">
      <circle cx="50" cy="50" r="42" fill="none" stroke="#efe1c4" stroke-width="9"/>
      <circle data-anim cx="50" cy="50" r="42" fill="none" stroke="#e0890f" stroke-width="9" stroke-linecap="round" pathLength="264" stroke-dasharray="264" transform="rotate(-90 50 50)" style="stroke-dashoffset:264; animation:jcRing 1.2s cubic-bezier(0.4,0,0.2,1) .5s both"/>
    </svg>
    <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <div style="font-weight:700; font-size:clamp(40px,5.4vw,66px); line-height:.9; color:#3a2a10; letter-spacing:-.03em;">147</div>
      <div style="font-family:'Space Mono',monospace; font-size:clamp(8px,1vw,11px); letter-spacing:.16em; text-transform:uppercase; color:#b08433;">temuan</div>
    </div>
  </div>
  <div style="text-align:left;">
    <div data-anim style="font-weight:700; font-size:clamp(46px,9vw,120px); line-height:.86; letter-spacing:-.035em; animation:jcWord .8s cubic-bezier(0.16,1,0.3,1) .3s both;"><span style="color:#20242c;">Just</span><br><span style="color:#e0890f;">Count</span></div>
    <div data-anim style="margin-top:clamp(14px,1.8vw,22px); max-width:clamp(220px,26vw,320px); padding:9px 18px; background:#20242c; border-radius:14px; font-family:'Space Mono',monospace; font-weight:700; font-size:clamp(10px,1.25vw,14px); letter-spacing:.06em; line-height:1.5; color:#fbf3e4; animation:jcTag .6s cubic-bezier(0.16,1,0.3,1) .7s both;">Audit Jasa Konsultansi Konstruksi</div>
  </div>
  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:1px solid rgba(32,36,44,.2); background:transparent; color:#20242c; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:.6;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play(){const r=this.root;if(!r)return;r.querySelectorAll('[data-anim]').forEach(el=>{const s=el.style.animation;el.style.animation='none';void el.offsetWidth;el.style.animation=s;});}
  renderVals(){return {rootRef:el=>{this.root=el;},rootClick:()=>this.play(),replayClick:e=>{if(e)e.stopPropagation();this.play();}};}
}
</script>
</body>
</html>

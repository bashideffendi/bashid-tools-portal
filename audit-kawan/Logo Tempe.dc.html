<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#f1efe7;}
    @keyframes tmWord{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes tmCard{from{opacity:0;transform:translateX(16px) rotate(2deg)}to{opacity:1;transform:translateX(0) rotate(2deg)}}
    @keyframes tmRow{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
    @keyframes tmHi{0%{background:rgba(217,138,61,0)}100%{background:rgba(217,138,61,.14)}}
  </style>
</helmet>
<div data-screen-label="Logo Tempe" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; gap:clamp(18px,3vw,56px); background:radial-gradient(ellipse 70% 60% at 50% 42%,#f5f3ec,#e8e4d9); overflow:hidden; cursor:pointer; font-family:'Bricolage Grotesque', system-ui, sans-serif;">
  <div data-anim style="flex:none; display:inline-flex; flex-direction:column; font-weight:800; font-size:clamp(58px,11vw,168px); line-height:.82; letter-spacing:-.045em; color:#23211b; animation:tmWord .8s cubic-bezier(0.16,1,0.3,1) .1s both;"><span>Tem</span><span style="display:flex; align-items:center; gap:.12em; color:#c0742b;"><span aria-hidden="true" style="flex:1; height:.12em; border-radius:.06em; background:#c0742b;"></span>pe</span></div>
  <div data-anim style="flex:none; width:clamp(228px,28vw,372px); padding:clamp(14px,1.8vw,20px); background:#fff; border-radius:14px; box-shadow:0 22px 50px rgba(35,33,27,.13); transform:rotate(2deg); animation:tmCard .7s cubic-bezier(0.16,1,0.3,1) .4s both;">
    <div style="display:flex; align-items:center; gap:10px; padding:9px 13px; background:#f3f1ea; border-radius:9px; margin-bottom:12px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a89f8b" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <span style="font-family:'Space Mono',monospace; font-size:clamp(10px,1.2vw,13px); color:#a89f8b;">cari temuan…</span>
    </div>
    <div data-anim style="display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; animation:tmRow .4s ease .8s both, tmHi .4s ease 1.25s both;"><span style="width:8px; height:8px; border-radius:50%; background:#d98a3d; flex:none;"></span><span style="flex:1; height:8px; border-radius:4px; background:#e6e2d6;"></span><span style="font-family:'Space Mono',monospace; font-size:11px; color:#c0742b; font-weight:700;">✓</span></div>
    <div data-anim style="display:flex; align-items:center; gap:10px; padding:8px 10px; animation:tmRow .4s ease .95s both;"><span style="width:8px; height:8px; border-radius:50%; background:#dcd7c8; flex:none;"></span><span style="flex:1; height:8px; border-radius:4px; background:#eeebe1;"></span></div>
    <div data-anim style="display:flex; align-items:center; gap:10px; padding:8px 10px; animation:tmRow .4s ease 1.07s both;"><span style="width:8px; height:8px; border-radius:50%; background:#dcd7c8; flex:none;"></span><span style="flex:1; height:8px; border-radius:4px; background:#eeebe1;"></span></div>
  </div>
  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:1px solid rgba(35,33,27,.2); background:transparent; color:#23211b; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:.6;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play(){const r=this.root;if(!r)return;r.querySelectorAll('[data-anim]').forEach(el=>{const s=el.style.animation;el.style.animation='none';void el.offsetWidth;el.style.animation=s;});}
  renderVals(){return {rootRef:el=>{this.root=el;},rootClick:()=>this.play(),replayClick:e=>{if(e)e.stopPropagation();this.play();}};}
}
</script>
</body>
</html>

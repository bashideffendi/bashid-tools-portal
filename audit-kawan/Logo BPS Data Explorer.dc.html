<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#eef1fb;}
    @keyframes bpSlam{0%{opacity:0;transform:translateY(20px) rotate(-2deg)}70%{opacity:1;transform:translateY(0) rotate(-2deg)}100%{opacity:1;transform:rotate(-2deg)}}
    @keyframes bpBar{0%{transform:scaleY(0)}70%{transform:scaleY(1.08)}100%{transform:scaleY(1)}}
    @keyframes bpStat{0%{opacity:0;transform:rotate(0) scale(0)}70%{opacity:1;transform:rotate(8deg) scale(1.15)}100%{opacity:1;transform:rotate(6deg) scale(1)}}
  </style>
</helmet>
<div data-screen-label="Logo BPS Data Explorer" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; gap:clamp(18px,3vw,48px); flex-wrap:wrap; background:#eef1fb; overflow:hidden; cursor:pointer; font-family:'Unbounded', system-ui, sans-serif;">

  <div style="position:relative;">
    <div style="display:flex; align-items:flex-end; gap:clamp(7px,1vw,12px); height:clamp(120px,17vw,220px);">
      <div data-anim style="width:clamp(20px,2.6vw,34px); height:40%; background:#7aa3ec; border:3px solid #14110c; border-radius:6px 6px 0 0; transform-origin:bottom; box-shadow:4px 4px 0 rgba(20,17,12,0.15); animation:bpBar 0.55s cubic-bezier(0.34,1.4,0.6,1) 0.3s both;"></div>
      <div data-anim style="width:clamp(20px,2.6vw,34px); height:62%; background:#ff6b4a; border:3px solid #14110c; border-radius:6px 6px 0 0; transform-origin:bottom; box-shadow:4px 4px 0 rgba(20,17,12,0.15); animation:bpBar 0.55s cubic-bezier(0.34,1.4,0.6,1) 0.45s both;"></div>
      <div data-anim style="width:clamp(20px,2.6vw,34px); height:48%; background:#ffd23e; border:3px solid #14110c; border-radius:6px 6px 0 0; transform-origin:bottom; box-shadow:4px 4px 0 rgba(20,17,12,0.15); animation:bpBar 0.55s cubic-bezier(0.34,1.4,0.6,1) 0.6s both;"></div>
      <div data-anim style="width:clamp(20px,2.6vw,34px); height:100%; background:#b8e62e; border:3px solid #14110c; border-radius:6px 6px 0 0; transform-origin:bottom; box-shadow:4px 4px 0 rgba(20,17,12,0.15); animation:bpBar 0.55s cubic-bezier(0.34,1.4,0.6,1) 0.75s both;"></div>
    </div>
    <div data-anim style="position:absolute; top:-22%; right:-22%; padding:7px 13px; background:#14110c; color:#b8e62e; border-radius:8px; font-family:'Space Mono', monospace; font-weight:700; font-size:clamp(11px,1.5vw,16px); transform:rotate(6deg); animation:bpStat 0.5s cubic-bezier(0.34,1.5,0.6,1) 1s both;">&#9650; +12,4%</div>
  </div>

  <div data-anim style="animation:bpSlam 0.6s cubic-bezier(0.3,1.3,0.5,1) 0.1s both;">
    <div style="font-weight:800; font-size:clamp(56px,10vw,150px); line-height:0.84; letter-spacing:-0.03em; color:#1e40af; transform:rotate(-2deg); text-shadow:4px 5px 0 rgba(30,64,175,0.18);">BPS</div>
    <div style="margin-top:10px; font-family:'Space Mono', monospace; font-weight:700; font-size:clamp(10px,1.3vw,14px); letter-spacing:0.26em; color:#3b6fe0; text-transform:uppercase; transform:rotate(-2deg);">Data Explorer</div>
  </div>

  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:2px solid #14110c; background:#b8e62e; color:#14110c; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:3px 3px 0 #14110c; transition:transform .15s;" style-hover="transform:translate(-1px,-1px);">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play() { const r = this.root; if (!r) return; r.querySelectorAll('[data-anim]').forEach(el => { const s = el.style.animation; el.style.animation = 'none'; void el.offsetWidth; el.style.animation = s; }); }
  renderVals() { return { rootRef: (el) => { this.root = el; }, rootClick: () => this.play(), replayClick: (e) => { if (e) e.stopPropagation(); this.play(); } }; }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#eef2fb;}
    @keyframes pdWord{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pdRow{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
    @keyframes pdBadge{0%{opacity:0;transform:scale(.4)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
  </style>
</helmet>
<div data-screen-label="Logo PDDIKTI Checker" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse 70% 60% at 50% 40%,#f3f6fd,#e4eaf7); overflow:hidden; cursor:pointer; font-family:'Plus Jakarta Sans', system-ui, sans-serif;">
  <div style="position:relative; display:flex; flex-direction:column; align-items:center; gap:clamp(18px,2.4vw,30px);">
    <div style="text-align:center;">
      <div data-anim style="font-weight:800; font-size:clamp(46px,8.4vw,108px); line-height:1; letter-spacing:-.03em; color:#16357f; animation:pdWord .7s cubic-bezier(0.16,1,0.3,1) .1s both;">PDDIKTI</div>
      <div data-anim style="font-family:'Space Mono',monospace; font-size:clamp(10px,1.3vw,14px); letter-spacing:.34em; text-transform:uppercase; color:#2150c9; margin-top:8px; animation:pdWord .6s ease .28s both;">Checker · 12.480 data</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:9px; width:clamp(260px,34vw,392px); padding:clamp(14px,1.8vw,20px); background:#fff; border-radius:16px; box-shadow:0 18px 40px rgba(33,80,201,.14);">
      <div data-anim style="display:flex; align-items:center; gap:12px; animation:pdRow .45s ease .45s both;"><span style="width:30px; height:30px; border-radius:50%; background:#dbe5fb; flex:none;"></span><span style="flex:1; height:8px; border-radius:4px; background:#e7eaf0;"></span><span data-anim style="display:flex; align-items:center; gap:5px; padding:5px 11px; border-radius:999px; background:#e3f6ec; color:#0f7a52; font-size:clamp(10px,1.2vw,13px); font-weight:700; animation:pdBadge .45s cubic-bezier(0.34,1.5,0.6,1) .7s both;">✓ AKTIF</span></div>
      <div data-anim style="display:flex; align-items:center; gap:12px; animation:pdRow .45s ease .6s both;"><span style="width:30px; height:30px; border-radius:50%; background:#dbe5fb; flex:none;"></span><span style="flex:1; height:8px; border-radius:4px; background:#e7eaf0;"></span><span data-anim style="display:flex; align-items:center; gap:5px; padding:5px 11px; border-radius:999px; background:#e1ebfc; color:#2150c9; font-size:clamp(10px,1.2vw,13px); font-weight:700; animation:pdBadge .45s cubic-bezier(0.34,1.5,0.6,1) .92s both;">● LULUS</span></div>
      <div data-anim style="display:flex; align-items:center; gap:12px; animation:pdRow .45s ease .75s both;"><span style="width:30px; height:30px; border-radius:50%; background:#dbe5fb; flex:none;"></span><span style="flex:1; height:8px; border-radius:4px; background:#e7eaf0;"></span><span data-anim style="display:flex; align-items:center; gap:5px; padding:5px 11px; border-radius:999px; background:#e3f6ec; color:#0f7a52; font-size:clamp(10px,1.2vw,13px); font-weight:700; animation:pdBadge .45s cubic-bezier(0.34,1.5,0.6,1) 1.14s both;">✓ AKTIF</span></div>
    </div>
  </div>
  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:1px solid rgba(22,53,127,.2); background:transparent; color:#16357f; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:.6;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play(){const r=this.root;if(!r)return;r.querySelectorAll('[data-anim]').forEach(el=>{const s=el.style.animation;el.style.animation='none';void el.offsetWidth;el.style.animation=s;});}
  renderVals(){return {rootRef:el=>{this.root=el;},rootClick:()=>this.play(),replayClick:e=>{if(e)e.stopPropagation();this.play();}};}
}
</script>
</body>
</html>

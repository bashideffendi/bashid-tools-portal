<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#fbe9cf;}
    @keyframes psPop{0%{opacity:0;transform:translateY(-18px) scale(.7) rotate(-8deg)}65%{opacity:1;transform:translateY(4px) scale(1.06) rotate(3deg)}100%{opacity:1;transform:translateY(0) scale(1) rotate(0)}}
    @keyframes psBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
    @keyframes psWord{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes psSquig{from{stroke-dashoffset:120}to{stroke-dashoffset:0}}
    @keyframes psSteam{0%{opacity:0;transform:translateY(5px) scaleY(.7)}40%{opacity:.85}100%{opacity:0;transform:translateY(-16px) scaleY(1.2)}}
    @keyframes psTag{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</helmet>
<div data-screen-label="Logo Persotoan" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(8px,1.4vw,18px); background:radial-gradient(ellipse 86% 78% at 50% 32%,#ffeed2,#fcdcae 70%,#f6cf96); overflow:hidden; cursor:pointer; font-family:'Bricolage Grotesque', system-ui, sans-serif;">
  <div data-anim style="position:relative; animation:psPop .65s cubic-bezier(0.34,1.5,0.5,1) .1s both;">
    <div style="animation:psBob 3.6s ease-in-out 1s infinite;">
      <svg width="clamp(96px,13vw,150px)" viewBox="0 0 120 96" style="display:block; overflow:visible;">
        <path d="M40 6 Q48 16 42 26" fill="none" stroke="#e0763a" stroke-width="5" stroke-linecap="round" style="opacity:0; animation:psSteam 2.6s ease-out .9s infinite"/>
        <path d="M60 2 Q69 14 60 26" fill="none" stroke="#e0763a" stroke-width="5" stroke-linecap="round" style="opacity:0; animation:psSteam 2.6s ease-out 1.3s infinite"/>
        <path d="M80 6 Q88 16 82 26" fill="none" stroke="#e0763a" stroke-width="5" stroke-linecap="round" style="opacity:0; animation:psSteam 2.6s ease-out 1.7s infinite"/>
        <path d="M16 44 H104 Q100 84 60 86 Q20 84 16 44 Z" fill="#e8612c"/>
        <ellipse cx="60" cy="44" rx="44" ry="9" fill="#c0461c"/>
        <ellipse cx="60" cy="43" rx="36" ry="6.5" fill="#ffa552"/>
        <circle cx="48" cy="42" r="3" fill="#ffd84d"/><circle cx="70" cy="44" r="2.6" fill="#5fc77e"/>
        <rect x="6" y="58" width="108" height="9" rx="4.5" fill="#9c3713"/>
      </svg>
    </div>
  </div>
  <div data-anim style="font-weight:800; font-size:clamp(54px,11vw,148px); line-height:.9; letter-spacing:-.045em; color:#3a1d10; animation:psWord .8s cubic-bezier(0.16,1,0.3,1) .3s both;">persotoan</div>
  <svg data-anim aria-hidden="true" width="clamp(150px,22vw,300px)" height="14" viewBox="0 0 300 14" style="display:block; margin-top:-2px;"><path d="M3 8 Q25 1 47 8 T91 8 T135 8 T179 8 T223 8 T267 8 T297 8" fill="none" stroke="#e8612c" stroke-width="4" stroke-linecap="round" pathLength="120" style="stroke-dasharray:120; animation:psSquig .9s cubic-bezier(0.5,0,0.2,1) .95s both"/></svg>
  <div data-anim style="margin-top:clamp(10px,1.4vw,18px); padding:8px 18px; background:#3a1d10; border-radius:999px; font-family:'Space Mono',monospace; font-weight:700; font-size:clamp(10px,1.3vw,15px); letter-spacing:.2em; text-transform:uppercase; color:#fbe9cf; animation:psTag .6s cubic-bezier(0.16,1,0.3,1) 1.15s both;">soto nusantara</div>
  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:none; background:#3a1d10; color:#fbe9cf; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:.8; transition:transform .2s;" style-hover="transform:scale(1.1) rotate(-8deg);">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play(){const r=this.root;if(!r)return;r.querySelectorAll('[data-anim]').forEach(el=>{const s=el.style.animation;el.style.animation='none';void el.offsetWidth;el.style.animation=s;});}
  renderVals(){return {rootRef:el=>{this.root=el;},rootClick:()=>this.play(),replayClick:e=>{if(e)e.stopPropagation();this.play();}};}
}
</script>
</body>
</html>

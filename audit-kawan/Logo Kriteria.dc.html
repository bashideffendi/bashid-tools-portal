<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#f4f0e6;}
    @keyframes krMark{0%{opacity:0;transform:translateY(14px) scale(.85)}70%{opacity:1;transform:translateY(0) scale(1.03)}100%{opacity:1;transform:scale(1)}}
    @keyframes krBeam{0%{transform:rotate(-10deg)}30%{transform:rotate(7deg)}55%{transform:rotate(-4deg)}78%{transform:rotate(2deg)}100%{transform:rotate(0)}}
    @keyframes krWord{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes krRule{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    @keyframes krChip{0%{opacity:0;transform:translateY(10px) scale(.9)}60%{opacity:1;transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
  </style>
</helmet>
<div data-screen-label="Logo Kriteria" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(14px,2vw,22px); background:radial-gradient(ellipse 68% 60% at 50% 42%,#f8f4ea,#ece4d2); overflow:hidden; cursor:pointer; font-family:'Playfair Display', Georgia, serif;">
  <div data-anim style="animation:krMark .7s cubic-bezier(0.16,1,0.3,1) .1s both;">
    <svg width="clamp(64px,8vw,96px)" viewBox="0 0 100 100" style="display:block; overflow:visible;">
      <line x1="50" y1="22" x2="50" y2="80" stroke="#14294a" stroke-width="4" stroke-linecap="round"/>
      <circle cx="50" cy="16" r="4.4" fill="#b08436"/>
      <path d="M39 82 L61 82 L68 91 L32 91 Z" fill="#14294a"/>
      <g style="transform-box:view-box; transform-origin:50px 27px; animation:krBeam 1.7s cubic-bezier(0.33,1,0.68,1) .5s both;">
        <line x1="16" y1="27" x2="84" y2="27" stroke="#14294a" stroke-width="4" stroke-linecap="round"/>
        <line x1="17" y1="27" x2="8" y2="45" stroke="#b08436" stroke-width="2.6"/><line x1="17" y1="27" x2="26" y2="45" stroke="#b08436" stroke-width="2.6"/>
        <path d="M7 45 Q17 59 27 45" fill="none" stroke="#b08436" stroke-width="3.6"/>
        <line x1="83" y1="27" x2="74" y2="45" stroke="#b08436" stroke-width="2.6"/><line x1="83" y1="27" x2="92" y2="45" stroke="#b08436" stroke-width="2.6"/>
        <path d="M73 45 Q83 59 93 45" fill="none" stroke="#b08436" stroke-width="3.6"/>
      </g>
    </svg>
  </div>
  <div data-anim style="font-weight:600; font-size:clamp(56px,11vw,154px); line-height:.92; letter-spacing:.005em; color:#14294a; animation:krWord .9s cubic-bezier(0.16,1,0.3,1) .4s both;">Kriteria</div>
  <div data-anim aria-hidden="true" style="width:clamp(130px,18vw,250px); height:1px; background:#b08436; transform-origin:center; animation:krRule .8s cubic-bezier(0.16,1,0.3,1) .95s both;"></div>
  <div data-anim style="display:flex; align-items:center; gap:10px; font-family:'Space Mono',monospace; font-size:clamp(10px,1.3vw,14px); letter-spacing:.16em; color:#5b6b82; text-transform:uppercase; animation:krChip .6s cubic-bezier(0.34,1.4,0.6,1) 1.1s both;"><span style="font-family:'Playfair Display',serif; font-weight:700; color:#b08436; font-size:1.5em; letter-spacing:0;">§</span> Pasal 12 ayat (2) <span style="color:#2f7d54;">✓ cocok</span></div>
  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:1px solid rgba(20,41,74,.2); background:transparent; color:#14294a; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:.6;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play(){const r=this.root;if(!r)return;r.querySelectorAll('[data-anim]').forEach(el=>{const s=el.style.animation;el.style.animation='none';void el.offsetWidth;el.style.animation=s;});}
  renderVals(){return {rootRef:el=>{this.root=el;},rootClick:()=>this.play(),replayClick:e=>{if(e)e.stopPropagation();this.play();}};}
}
</script>
</body>
</html>

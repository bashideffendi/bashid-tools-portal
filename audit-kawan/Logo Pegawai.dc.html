<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#ecf6fb;}
    @keyframes pgWord{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pgCard{from{opacity:0;transform:translateY(16px) rotate(2deg)}to{opacity:1;transform:translateY(0) rotate(2deg)}}
    @keyframes pgRow{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
    @keyframes pgCheck{0%{opacity:0;transform:scale(.3)}60%{opacity:1;transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}
  </style>
</helmet>
<div data-screen-label="Logo Pegawai" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; gap:clamp(20px,4vw,64px); flex-wrap:wrap; background:radial-gradient(ellipse 70% 60% at 50% 42%,#f1f9fc,#dcedf4); overflow:hidden; cursor:pointer; font-family:'Plus Jakarta Sans', system-ui, sans-serif;">
  <div data-anim style="font-weight:800; font-size:clamp(50px,9.4vw,128px); line-height:1; letter-spacing:-.03em; color:#0e6d86; animation:pgWord .7s cubic-bezier(0.16,1,0.3,1) .1s both;">Pegawai</div>
  <div data-anim style="position:relative; width:clamp(190px,22vw,242px); padding:clamp(16px,1.8vw,22px); background:#fff; border-radius:16px; box-shadow:0 18px 44px rgba(14,109,134,.2); transform:rotate(2deg); animation:pgCard .7s cubic-bezier(0.16,1,0.3,1) .3s both;">
    <div style="width:44px; height:5px; border-radius:3px; background:#cfe4ec; margin:0 auto 14px;"></div>
    <div style="display:flex; align-items:center; gap:13px;">
      <div style="width:clamp(46px,5vw,58px); height:clamp(46px,5vw,58px); border-radius:50%; background:#0891b2; flex:none; position:relative; overflow:hidden;"><div style="position:absolute; left:50%; top:32%; width:38%; height:38%; background:#fff; border-radius:50%; transform:translateX(-50%);"></div><div style="position:absolute; left:50%; bottom:-18%; width:74%; height:54%; background:#fff; border-radius:50% 50% 0 0; transform:translateX(-50%);"></div></div>
      <div style="flex:1; display:flex; flex-direction:column; gap:7px;">
        <div data-anim style="height:9px; border-radius:4px; background:#13384a; width:88%; animation:pgRow .4s ease .6s both;"></div>
        <div data-anim style="height:7px; border-radius:4px; background:#cfe0e8; width:64%; animation:pgRow .4s ease .72s both;"></div>
        <div data-anim style="font-family:'Space Mono',monospace; font-size:10px; color:#5e93a6; letter-spacing:.08em; animation:pgRow .4s ease .84s both;">NIP 1987••••</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-top:15px; padding-top:13px; border-top:1px solid #e7eef2;">
      <span style="padding:4px 11px; border-radius:6px; background:#e0f3f8; color:#0e6d86; font-size:11px; font-weight:700; letter-spacing:.06em;">ASN</span>
      <span data-anim style="display:flex; align-items:center; gap:5px; color:#16a34a; font-size:12px; font-weight:700; font-family:'Space Mono',monospace; animation:pgCheck .45s cubic-bezier(0.34,1.6,0.6,1) 1s both;">✓ VALID</span>
    </div>
  </div>
  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:1px solid rgba(14,109,134,.22); background:transparent; color:#0e6d86; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:.6;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play(){const r=this.root;if(!r)return;r.querySelectorAll('[data-anim]').forEach(el=>{const s=el.style.animation;el.style.animation='none';void el.offsetWidth;el.style.animation=s;});}
  renderVals(){return {rootRef:el=>{this.root=el;},rootClick:()=>this.play(),replayClick:e=>{if(e)e.stopPropagation();this.play();}};}
}
</script>
</body>
</html>

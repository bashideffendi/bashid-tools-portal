<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;background:#1b1e24;}
    @keyframes ctFeed{from{opacity:0;transform:translateY(-22px) rotate(-1.6deg)}to{opacity:1;transform:translateY(0) rotate(-1.6deg)}}
    @keyframes ctRow{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
    @keyframes ctStamp{0%{opacity:0;transform:scale(1.5)}65%{opacity:1;transform:scale(.96)}100%{opacity:1;transform:scale(1)}}
    @keyframes ctBlink{0%,48%{opacity:1}48.01%,100%{opacity:0}}
  </style>
</helmet>
<div data-screen-label="Logo Calctape" ref="{{ rootRef }}" onClick="{{ rootClick }}" style="position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse 70% 60% at 50% 45%,#242832,#16191f); overflow:hidden; cursor:pointer; font-family:'Space Mono', monospace;">
  <div data-anim style="position:relative; width:clamp(248px,30vw,344px); background:#fbfaf6; border-radius:5px; padding:clamp(20px,2.4vw,30px) clamp(20px,2.6vw,32px) clamp(26px,3vw,36px); box-shadow:0 30px 60px rgba(0,0,0,.5); transform:rotate(-1.6deg); animation:ctFeed .7s cubic-bezier(0.16,1,0.3,1) both; -webkit-mask:radial-gradient(7px at 7px 50%,transparent 96%,#000) 0 0/100% 14px, radial-gradient(7px at calc(100% - 7px) 50%,transparent 96%,#000) 0 0/100% 14px; mask:radial-gradient(7px at 7px 50%,transparent 96%,#000) 0 0/100% 14px, radial-gradient(7px at calc(100% - 7px) 50%,transparent 96%,#000) 0 0/100% 14px;">
    <div style="text-align:center; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(32px,4.6vw,54px); color:#1b1e24; letter-spacing:-.02em; line-height:1;">Calctape</div>
    <div style="text-align:center; font-size:clamp(8px,1vw,10px); letter-spacing:.34em; color:#9a958c; margin-top:7px; text-transform:uppercase;">Telstruk LHP</div>
    <div style="border-top:2px dashed #d8d2c4; margin:clamp(14px,1.8vw,20px) 0;"></div>
    <div style="display:flex; flex-direction:column; gap:clamp(7px,.9vw,10px); font-size:clamp(12px,1.5vw,16px); color:#3a3730;">
      <div data-anim style="display:flex; justify-content:space-between; animation:ctRow .4s ease .5s both;"><span>Temuan</span><span>127,00</span></div>
      <div data-anim style="display:flex; justify-content:space-between; animation:ctRow .4s ease .7s both;"><span>Koreksi</span><span>+ 38,50</span></div>
      <div data-anim style="display:flex; justify-content:space-between; animation:ctRow .4s ease .9s both;"><span>Selisih</span><span>+ 9,00</span></div>
    </div>
    <div style="border-top:2px solid #1b1e24; margin:clamp(12px,1.5vw,16px) 0 clamp(10px,1.2vw,13px);"></div>
    <div data-anim style="display:flex; justify-content:space-between; align-items:baseline; font-family:'Space Grotesk',sans-serif; font-weight:700; animation:ctStamp .5s cubic-bezier(0.34,1.4,0.6,1) 1.2s both;"><span style="font-size:clamp(13px,1.6vw,17px); color:#1b1e24;">TOTAL</span><span style="font-size:clamp(22px,3vw,34px); color:#ea7a17;">174,50<span data-anim style="display:inline-block; width:.5ch; height:1em; background:#ea7a17; margin-left:3px; vertical-align:-2px; animation:ctBlink 1.05s step-end infinite;"></span></span></div>
  </div>
  <button data-replay onClick="{{ replayClick }}" aria-label="Putar ulang" style="position:fixed; right:24px; bottom:24px; width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.06); color:#e7e3da; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:.7;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  play(){const r=this.root;if(!r)return;r.querySelectorAll('[data-anim]').forEach(el=>{const s=el.style.animation;el.style.animation='none';void el.offsetWidth;el.style.animation=s;});}
  renderVals(){return {rootRef:el=>{this.root=el;},rootClick:()=>this.play(),replayClick:e=>{if(e)e.stopPropagation();this.play();}};}
}
</script>
</body>
</html>

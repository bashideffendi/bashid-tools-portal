<style>
:root{
  --ink:#0e0e0e; --bg:#ffffff; --soft:#6b6b6b; --line:#e4e4e2; --hair:#111;
  --accent:#e2231a;
  --sans:"Archivo","Helvetica Neue",Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:18px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:var(--ink);color:#fff}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.card:focus-visible{outline-offset:-2px}
.prog-head:focus-visible{outline-offset:6px}
.skip{position:absolute;left:12px;top:-60px;z-index:100;background:var(--ink);color:#fff;padding:10px 16px;font-size:13px;font-weight:600;transition:top .2s}
.skip:focus{top:8px}
.wrap{max-width:1320px;margin:0 auto;padding:0 40px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}

/* announcement */
.announce{background:var(--ink);color:#fff}
.announce .wrap{display:flex;align-items:center;justify-content:space-between;gap:20px;height:42px}
.announce .msg{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:12px;white-space:nowrap}
.announce .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex:none}
.announce a{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.announce a:hover{color:var(--accent)}

/* header */
header.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
header.nav .wrap{display:flex;align-items:center;justify-content:flex-end;height:74px}
.menu{display:flex;align-items:center;gap:34px}
.menu a{font-size:15px;font-weight:500;position:relative;padding:4px 0}
.menu a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1.5px;background:var(--ink);transition:width .3s}
.menu a:hover::after{width:100%}
.menu .ext{font-weight:600}
.menu .ext:hover{color:var(--accent)}

/* hero — nama di tengah */
.hero{padding:100px 0 0;text-align:center}
.hero .name{font-family:"Archivo Expanded","Archivo",sans-serif;font-size:clamp(30px,5.2vw,72px);font-weight:800;line-height:1.04;letter-spacing:-.02em}

/* ventures — compact brand strip */
.ventures{margin-top:84px;text-align:left}
.vgrid{display:grid;grid-template-columns:repeat(4,1fr);border-left:1px solid var(--line);border-top:1px solid var(--line)}
.vcell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:26px 24px 24px;display:flex;flex-direction:column;gap:14px;min-height:150px;transition:background .35s}
.vcell:hover{background:#fafafa}
.vcell .vtop{height:74px;display:flex;align-items:center;justify-content:center;width:100%}
.vcell .logo{width:auto;max-width:100%;object-fit:contain;display:block}
.vcell .bname{font-weight:800;font-size:25px;letter-spacing:-.025em;line-height:1.05;text-align:center}
.vcell .bmeta{display:flex;align-items:center;justify-content:center;gap:8px}
.vcell .burl{font-size:12.5px;font-weight:600;letter-spacing:.04em;color:var(--soft)}
.vcell a.burl:hover{color:var(--accent)}
.vcell .ar{transition:transform .3s;font-weight:700;color:var(--soft)}
.vcell:hover .ar{transform:translateX(5px);color:var(--accent)}

/* program sections */
.program{padding:116px 0 0}
.prog-head{display:flex;justify-content:space-between;align-items:flex-end;gap:28px;border-bottom:2px solid var(--hair);padding-bottom:22px;cursor:pointer;user-select:none}
.prog-head .no{display:block;font-size:13px;font-weight:700;letter-spacing:.2em;color:var(--accent);margin-bottom:14px}
.prog-head h2{font-size:clamp(30px,3.6vw,52px);font-weight:800;letter-spacing:-.03em;line-height:.92}
.prog-head .meta{display:flex;align-items:center;gap:16px;color:var(--soft);font-size:15px;flex:none;white-space:nowrap}
.prog-head .meta .ct{font-weight:700;color:var(--ink)}
.prog-head .chev{display:inline-flex;color:var(--soft);transition:transform .35s,color .25s}
.prog-head:hover .chev{color:var(--ink)}
.program.collapsed .grid{display:none}
.program.collapsed .prog-head .chev{transform:rotate(-180deg)}

.grid{display:grid;grid-template-columns:repeat(2,1fr);border-left:1px solid var(--line)}
.card{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:32px 30px 28px;display:flex;flex-direction:column;min-height:300px;position:relative;background:var(--bg);transition:background .35s}
.card:not(.disabled):hover{background:#fafafa}
.card .embed{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;border:1px solid var(--line);margin-bottom:22px;background:#f4f4f2}
.card .embed iframe{position:absolute;top:0;left:0;width:640px;height:360px;border:0;transform-origin:0 0;pointer-events:none}
.card.disabled .embed{opacity:.45}
.card .cat{color:var(--soft);display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.card .cat .badge{color:var(--accent);font-weight:700}
.card .cat .badge.soon{color:var(--soft)}
.card h3{font-size:27px;font-weight:800;letter-spacing:-.025em;line-height:1.1;margin-bottom:14px}
.card .desc{color:var(--soft);font-size:16px;line-height:1.5;flex:1}
.card .tags{display:flex;flex-wrap:wrap;gap:6px 14px;margin:24px 0 20px}
.tag{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);white-space:nowrap}
.card .more{display:inline-flex;align-items:center;justify-content:space-between;font-weight:700;font-size:14.5px;border-top:1px solid var(--line);padding-top:18px;white-space:nowrap;transition:color .3s}
.card .more .ar{transition:transform .3s}
.card:not(.disabled):hover .more{color:var(--accent)}
.card:not(.disabled):hover .more .ar{transform:translateX(7px)}

/* footer */
footer{margin-top:128px;background:var(--ink);color:#fff}
footer .wrap{padding:80px 40px 46px}
footer .top{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:40px;padding-bottom:56px;border-bottom:1px solid rgba(255,255,255,.16)}
footer .bigmark{font-size:clamp(44px,5.6vw,84px);font-weight:900;letter-spacing:-.04em;line-height:.9}
footer .col h4{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.62);margin-bottom:18px}
footer .col a,footer .col p{display:block;color:#fff;font-size:15.5px;margin-bottom:11px;opacity:.9}
footer .col a:hover{color:var(--accent);opacity:1}
footer .bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;padding-top:30px}
footer .bottom .c{font-size:13px;color:rgba(255,255,255,.62)}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}

@media(max-width:980px){
  .wrap{padding:0 24px}
  .grid,.vgrid{grid-template-columns:1fr 1fr}
  .menu a:not(.ext){display:none}
  footer .top{grid-template-columns:1fr 1fr}
  .prog-head{gap:16px}
}
@media(max-width:600px){
  .grid,.vgrid,footer .top{grid-template-columns:1fr}
  footer .wrap{padding:56px 24px 40px}
  .announce a{display:none}
}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  .reveal{opacity:1;transform:none;transition:none}
  *{transition:none!important}
}
</style>
</head>

<script>
/* ---- Content (single source of truth) ---- */
const SITE = {
  name: "Bashid Effendi",
  ventures: [
    { name: "Tiny Hour Tales", url: "https://tinyhourtales.com", label: "tinyhourtales.com", logo: "static/logos/tiny-hour-tales.png", h: 68 },
    { name: "Tempus Collective", url: "https://tempuscollective.com", label: "tempuscollective.com", logo: "static/logos/tempus.png", h: 52 },
    { name: "Klunting", url: "https://www.klunting.com", label: "klunting.com", logo: "static/logos/klunting.png", h: 50 },
    { name: "Macnoos", url: "https://www.instagram.com/macnoos", label: "@macnoos", logo: "static/logos/macnoos.png", h: 38 }
  ],
  sections: [
    {
      no: "01", key: "audit", title: "Audit",
      tools: [
        { name: "Tempe", status: "new", tags: ["Temuan", "Database"], desc: "Database temuan BPK — cari & telusur teks temuan pemeriksaan lintas LHP dan wilayah.", link: "https://tempe.masbash.id", label: "Buka Tool" },
        { name: "Just Count", status: "new", tags: ["Multi-tenant", "BAPK Auto", "SKA Check"], desc: "Audit kepatuhan jasa konsultansi konstruksi APBD. 3-area checklist, engine numerik, dan auto-generate BAPK Word.", link: "https://justcount.up.railway.app", label: "Buka Tool" },
        { name: "PDDIKTI Checker", tags: ["Excel", "Bulk"], desc: "Cek status kemahasiswaan dari PDDIKTI. Upload Excel, dapat status Aktif/Lulus/DO secara massal.", link: "https://pddikti-checker.up.railway.app", label: "Buka Tool" },
        { name: "SKA Checker", tags: ["SKA/SKT/SKK", "LPJK"], desc: "Verifikasi sertifikat keahlian konstruksi dari LPJK. Cek keaslian dan status sertifikat.", link: "https://cek-sertifikat-keahlian.up.railway.app", label: "Buka Tool" },
        { name: "SIKD Browser", tags: ["APBD", "DJPK"], desc: "Jelajahi data APBD seluruh Pemda Indonesia. Pendapatan, belanja, pembiayaan, komparasi antar tahun.", link: "https://sikd-browser.up.railway.app", label: "Buka Tool" },
        { name: "BPS Data Explorer", tags: ["BPS", "Statistik"], desc: "Jelajahi data statistik resmi BPS — publikasi, siaran pers, indikator strategis, SDGs, ekonomi per wilayah.", link: "https://data-bps.up.railway.app/", label: "Buka Tool" },
        { name: "SIAP PKP Filler", tags: ["SIAP BPK", "Desktop"], desc: "Auto-fill kolom Hasil Pengujian di SIAP BPK dari Excel PKP. Aplikasi desktop (butuh download + VPN BPK).", link: "https://masbash.id/siap-pkp-filler.html", label: "Panduan & Download" },
        { name: "Kriteria", status: "new", tags: ["AI", "pasal.id", "BAPK"], desc: "AI cari kriteria temuan pemeriksaan — paste kondisi, dapat peraturan + pasal + ayat relevan dengan format BPK siap copy ke BAPK.", link: "https://kriteria.masbash.id", label: "Buka Tool" },
        { name: "CalcTape Audit", status: "new", tags: ["Telstruk", "AI", ".calc"], desc: "Telstruk LHP otomatis — drop file Word, dapat verifikasi aritmatika (narasi + tabel) jadi file .calc. Hybrid regex + AI.", link: "https://calctape.vercel.app", label: "Buka Tool" },
        { name: "Pegawai", status: "new", tags: ["ASN", "Kepegawaian"], desc: "Audit data kepegawaian — uji kesesuaian status, NIP, dan data ASN terhadap realisasi belanja pegawai.", link: "https://belpeg.vercel.app", label: "Buka Tool" },
        { name: "INAPROC", status: "soon", tags: ["Pengadaan", "Evaluasi"], desc: "Evaluasi penawaran pengadaan barang/jasa dari data INAPROC/LKPP — bandingkan harga vendor, deteksi penawaran terendah & kewajaran.", link: "", label: "Coming Soon" },
        { name: "Perjadin", status: "soon", tags: ["SPPD", "Perjadin"], desc: "Audit perjalanan dinas — cek kesesuaian SPPD, tarif, dan bukti pertanggungjawaban perjalanan.", link: "", label: "Coming Soon" }
      ]
    },
    {
      no: "02", key: "hobbies", title: "Hobbies",
      tools: [
        { name: "Tiny Hour Tales", tags: ["Watches", "Inventory"], desc: "Inventory koleksi jam tangan dengan dashboard, story per jam, dan catatan service.", link: "https://inventory.tinyhourtales.com", label: "Buka Tool" },
        { name: "Seiko Almanac", status: "new", tags: ["Seiko", "Watches", "Decoder"], desc: "Meja referensi Seiko buat kolektor — decode tahun produksi dari nomor serial, decoder case-code vintage pra-1966, 230+ caliber & 1.179 model dari katalog asli 1932–2020. Sibling Tiny Hour Tales.", link: "https://seiko.tinyhourtales.com", label: "Buka Tool" },
        { name: "Persotoan", status: "new", tags: ["Peta", "Kuliner"], desc: "Peta interaktif kuliner soto Nusantara — 18+ jenis soto & 165 warung legendaris, filter basis kuah & wilayah.", link: "https://soto.masbash.id", label: "Buka Tool" },
        { name: "RABin", tags: ["RAB", "Konstruksi"], desc: "Tools RAB online untuk konstruksi — kalkulator AHSP, harga regional, dan ekspor Excel/PDF.", link: "https://rabindonesia.vercel.app", label: "Buka Tool" },
        { name: "Hujan di Batam", status: "new", tags: ["Radar", "Cuaca"], desc: "Radar hujan real-time Batam & sekitarnya — overlay citra radar MSS Singapura (240 km), 3 view + time slider + animasi.", link: "https://hujandibatam.masbash.id", label: "Buka Tool" },
        { name: "Batam Bites", status: "new", tags: ["Kuliner", "Peta", "Halal"], desc: "Direktori kuliner Batam buat turis — 118 warung legendaris, seafood & hidden gem dengan peta interaktif, filter halal, dan dwibahasa ID/EN.", link: "https://batam-bites.vercel.app", label: "Buka Tool" }
      ]
    },
    {
      no: "03", key: "finance", title: "Finance",
      tools: [
        { name: "Investment Dashboard", tags: ["Portfolio", "Real-time"], desc: "Track portfolio saham, reksa dana, obligasi — terminal-style dashboard untuk monitoring real-time.", link: "https://kelolainvestasi.vercel.app", label: "Buka Tool" },
        { name: "Klunting", tags: ["Net Worth", "Goals"], desc: "Wealth Management App — net worth, cash flow, alokasi aset, dan goals dalam satu tempat.", link: "https://www.klunting.com", label: "Buka Tool" }
      ]
    }
  ]
};

/* ---- Render ---- */
const S = SITE;
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const allTools = S.sections.flatMap(s => s.tools.map(t => ({...t, cat: s.title, key: s.key})));

/* live/dev counts derived from data (can never drift) */
const liveN = allTools.filter(t => t.status !== 'soon').length;
const devN = allTools.filter(t => t.status === 'soon').length;
document.getElementById('amsg').textContent = `${liveN} Tools Live · ${devN} In Dev`;

/* ventures */
document.getElementById('vgrid').innerHTML = S.ventures.map(v => {
  const head = v.logo
    ? `<img class="logo" src="${esc(v.logo)}" alt="${esc(v.name)}" style="height:${Number(v.h) || 44}px" />`
    : `<div class="bname">${esc(v.name)}</div>`;
  const meta = v.url
    ? `<div class="bmeta"><a class="burl" href="${esc(v.url)}" target="_blank" rel="noopener">${esc(v.label)}</a><span class="ar" aria-hidden="true">↗</span></div>`
    : `<div class="bmeta"><span class="burl">${esc(v.label)}</span></div>`;
  return `<div class="vcell"><div class="vtop">${head}</div>${meta}</div>`;
}).join('');

/* footer flagship tool links */
const fcols = ['Tempe','Just Count','Kriteria','Persotoan','Investment Dashboard'];
document.getElementById('fcol-tools').insertAdjacentHTML('beforeend',
  fcols.map(n => { const t = allTools.find(x => x.name === n); return t && t.link ? `<a href="${esc(t.link)}" target="_blank" rel="noopener">${esc(t.name)}</a>` : ''; }).join(''));

/* embedded logo (audit tools) — tool name -> /logos/<slug>.html */
const LOGOS = {
  "Just Count": "just-count",
  "PDDIKTI Checker": "pddikti-checker",
  "SKA Checker": "ska-checker",
  "SIKD Browser": "sikd-browser",
  "BPS Data Explorer": "bps-data-explorer",
  "SIAP PKP Filler": "siap-pkp-filler",
  "Kriteria": "kriteria",
  "CalcTape Audit": "calctape",
  "Persotoan": "persotoan",
  "Hujan di Batam": "hujan-di-batam",
  "Batam Bites": "batam-bites",
  "Investment Dashboard": "investment-dashboard",
  "INAPROC": "inaproc",
  "Pegawai": "pegawai",
  "Perjadin": "perjadin",
  "Tempe": "tempe",
  "Tiny Hour Tales": "tiny-hour-tales",
  "Seiko Almanac": "seiko-almanac",
  "RABin": "rabin",
  "Klunting": "klunting"
};

/* program sections — text cards */
function card(t, i, sec){
  const dis = t.status === 'soon';
  const badge = t.status === 'new' ? '<span class="badge">New</span>'
    : (t.status === 'soon' ? '<span class="badge soon">Coming Soon</span>' : '<span></span>');
  const idx = sec.title + ' · #' + String(i + 1).padStart(2, '0');
  const tags = t.tags.map(x => `<span class="tag">${esc(x)}</span>`).join('');
  const slug = LOGOS[t.name];
  const embed = slug ? `<div class="embed" data-logo="${slug}" data-name="${esc(t.name)}"></div>` : '';
  const more = dis ? `<span class="more"><span>Segera Hadir</span></span>`
    : `<span class="more"><span>${esc(t.label)}</span><span class="ar" aria-hidden="true">→</span></span>`;
  const inner = `
    ${embed}
    <div class="cat eyebrow"><span>${esc(idx)}</span>${badge}</div>
    <h3>${esc(t.name)}</h3>
    <p class="desc">${esc(t.desc)}</p>
    <div class="tags">${tags}</div>
    ${more}`;
  if(dis) return `<div class="card disabled">${inner}</div>`;
  return `<a class="card" href="${esc(t.link)}" target="_blank" rel="noopener">${inner}</a>`;
}
function section(sec){
  return `<section class="program reveal" id="${sec.key}">
    <div class="prog-head" role="button" tabindex="0" aria-expanded="true">
      <div class="ph-left"><div class="no">${sec.no}</div><h2>${esc(sec.title)}</h2></div>
      <div class="meta"><span class="ct">${sec.tools.length} Tools</span><span class="chev" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
    </div>
    <div class="grid">${sec.tools.map((t, i) => card(t, i, sec)).join('')}</div>
  </section>`;
}
document.getElementById('app').innerHTML = S.sections.map(section).join('');

/* collapsible categories — click header to minimize/expand */
document.querySelectorAll('.prog-head').forEach(h => {
  const toggle = () => {
    const collapsed = h.closest('.program').classList.toggle('collapsed');
    h.setAttribute('aria-expanded', String(!collapsed));
    if(!collapsed) fitAllRaf();
  };
  h.addEventListener('click', toggle);
  h.addEventListener('keydown', e => { if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggle(); } });
});

/* ---- embedded logos: lazy-MOUNT on intersection (true lazy), scale to fit, replay on hover/touch ---- */
const _ro = window.ResizeObserver ? new ResizeObserver(() => fitAllRaf()) : null;
let _raf = 0;
function fitOne(box){ const f = box.querySelector('iframe'); if(!f) return; const w = box.clientWidth; if(w) f.style.transform = `scale(${w / 640})`; }
function fitAll(){
  const boxes = [...document.querySelectorAll('.card .embed')];
  const widths = boxes.map(b => b.clientWidth);                                   // read all first
  boxes.forEach((b, i) => { const f = b.querySelector('iframe'); if(f && widths[i]) f.style.transform = `scale(${widths[i] / 640})`; }); // then write all (no thrash)
}
function fitAllRaf(){ if(_raf) return; _raf = requestAnimationFrame(() => { _raf = 0; fitAll(); }); }
function mountEmbed(box){
  if(box.dataset.mounted) return; box.dataset.mounted = '1';
  const f = document.createElement('iframe');
  f.src = `/logos/${box.dataset.logo}.html`;
  f.title = `Logo ${box.dataset.name}`;
  f.tabIndex = -1;
  f.setAttribute('aria-hidden', 'true');
  box.appendChild(f);
  const tidy = () => { try { const b = f.contentDocument && f.contentDocument.querySelector('[data-replay]'); if(b) b.style.display = 'none'; } catch(e){} };
  const play = () => { try { const r = f.contentDocument && f.contentDocument.querySelector('[data-screen-label]'); if(r) r.click(); } catch(e){} tidy(); };
  f.addEventListener('load', () => { fitOne(box); [0, 600, 1500, 3000].forEach(d => setTimeout(() => { tidy(); fitOne(box); }, d)); });
  fitOne(box);
  box.addEventListener('mouseenter', play);
  box.addEventListener('touchstart', play, { passive: true });   // touch can't hover — let a tap replay
  if(_ro) _ro.observe(box);
}
const embedIO = ('IntersectionObserver' in window)
  ? new IntersectionObserver((es) => es.forEach(e => { if(e.isIntersecting){ embedIO.unobserve(e.target); mountEmbed(e.target); } }), { rootMargin: '400px 0px' })
  : null;
function observeEmbeds(){
  document.querySelectorAll('.card .embed:not([data-seen])').forEach(b => {
    b.setAttribute('data-seen', '1');
    if(embedIO) embedIO.observe(b); else mountEmbed(b);   // no IO support -> mount all
  });
}
observeEmbeds();
window.addEventListener('resize', fitAllRaf);

/* scroll reveal */
const io = new IntersectionObserver((es) => {
  es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
}, {threshold:.04});
document.querySelectorAll('.reveal').forEach(el => io.observe(el));
setTimeout(() => document.querySelectorAll('.reveal:not(.in)').forEach(el => el.classList.add('in')), 1500);
</script>
</body>
